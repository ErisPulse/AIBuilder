<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="https://www.erisdev.com/assets/img/logo.png" />
    <title>ErisPulse Builder — AI 模块构建器</title>
    <meta
      name="description"
      content="ErisPulse AI 模块构建器：描述需求，AI 查阅官方文档后生成完整 ErisPulse 模块代码并打包下载。"
    />

    <!-- 防止主题闪烁：默认深色 -->
    <script>
      (function () {
        try {
          var saved = localStorage.getItem("erispulse-builder-theme");
          var theme = saved || "dark";
          document.documentElement.setAttribute("data-theme", theme);
        } catch (e) {
          document.documentElement.setAttribute("data-theme", "dark");
        }
      })();
    </script>

    <!-- 字体 -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Font Awesome（图标） -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      referrerpolicy="no-referrer"
    />

    <!-- 样式：基础 + builder -->
    <link rel="stylesheet" href="assets/css/base.css" />
    <link rel="stylesheet" href="assets/css/builder.css" />

    <!-- marked.js（Markdown 渲染，builder.js 运行时按需调用 window.marked） -->
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.2/marked.min.js"
      defer
    ></script>
    <!-- Prism（可选语法高亮） -->
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"
      defer
    ></script>
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"
      defer
    ></script>
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-toml.min.js"
      defer
    ></script>
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-json.min.js"
      defer
    ></script>
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-markdown.min.js"
      defer
    ></script>
  </head>

  <body>
    <div class="builder-app">
      <!-- ============ 顶部导航栏 ============ -->
      <nav class="builder-nav">
        <a class="builder-nav-brand" href="https://www.erisdev.com">
          <img
            src="https://www.erisdev.com/assets/img/logo.png"
            alt="ErisPulse"
          />
          <span>ErisPulse Builder</span>
        </a>
        <div class="builder-nav-actions">
          <!-- 语言切换 -->
          <div class="builder-lang-wrap">
            <button type="button" class="builder-nav-link builder-lang-btn" id="builder-lang-btn" title="Language">
              <i class="fas fa-globe"></i>
              <span id="builder-lang-label">ZH</span>
            </button>
            <div class="builder-lang-dropdown" id="builder-lang-dropdown"></div>
          </div>
          <!-- 配置 -->
          <button
            type="button"
            class="builder-nav-link"
            id="builder-config-modal-btn"
          >
            <i class="fas fa-sliders"></i>
            <span data-i18n="builder.settingsConfigBtn">配置</span>
          </button>
          <!-- GitHub -->
          <a
            class="builder-nav-link"
            href="https://github.com/ErisPulse/AIBuilder"
            target="_blank"
            rel="noopener"
            title="GitHub"
          >
            <i class="fab fa-github"></i>
          </a>
        </div>
      </nav>

      <!-- ============ Builder 视图（移植自 builder.html） ============ -->
      <div id="builder-view" class="view-container builder-view-container">
        <div class="builder-layout">
          <!-- 会话与文件面板 -->
          <aside class="builder-files-panel">
            <!-- 会话历史 -->
            <div class="builder-config-card builder-sessions-card">
              <h3 class="builder-config-title">
                <i class="fas fa-comments"></i>
                <span data-i18n="builder.sessions">会话</span>
                <div class="builder-config-actions">
                  <button
                    type="button"
                    class="builder-icon-btn"
                    id="builder-new-session"
                    data-i18n-title="builder.newSession"
                  >
                    <i class="fas fa-plus"></i>
                  </button>
                  <button
                    type="button"
                    class="builder-icon-btn"
                    id="builder-import-session"
                    data-i18n-title="builder.importSessions"
                  >
                    <i class="fas fa-file-import"></i>
                  </button>
                  <input
                    type="file"
                    id="builder-import-file"
                    accept="application/json,.json"
                    style="display: none"
                  />
                  <div class="builder-export-wrap">
                    <button
                      type="button"
                      class="builder-icon-btn"
                      id="builder-export-session"
                      data-i18n-title="builder.exportSessions"
                    >
                      <i class="fas fa-download"></i>
                    </button>
                    <div
                      class="builder-export-menu"
                      id="builder-export-menu"
                    >
                      <button
                        type="button"
                        class="builder-export-opt"
                        data-scope="current"
                      >
                        <i class="fas fa-check"></i>
                        <span data-i18n="builder.exportCurrent"
                          >导出当前会话</span
                        >
                      </button>
                      <button
                        type="button"
                        class="builder-export-opt"
                        data-scope="all"
                      >
                        <i class="fas fa-check"></i>
                        <span data-i18n="builder.exportAll">导出全部会话</span>
                      </button>
                    </div>
                  </div>
                </div>
              </h3>
              <div
                class="builder-sessions-list"
                id="builder-sessions-list"
              ></div>
            </div>

            <!-- 已生成文件 -->
            <div class="builder-config-card builder-files-card">
              <h3 class="builder-config-title">
                <i class="fas fa-folder-open"></i>
                <span data-i18n="builder.generatedFiles">已生成文件</span>
                <span class="builder-files-count" id="builder-files-count"
                  >0</span
                >
                <div class="builder-config-actions">
                  <button
                    type="button"
                    class="builder-icon-btn"
                    id="builder-undo"
                    data-i18n-title="builder.undo"
                    disabled
                  >
                    <i class="fas fa-rotate-left"></i>
                  </button>
                  <button
                    type="button"
                    class="builder-icon-btn"
                    id="builder-redo"
                    data-i18n-title="builder.redo"
                    disabled
                  >
                    <i class="fas fa-rotate-right"></i>
                  </button>
                </div>
              </h3>
              <div class="builder-files-list" id="builder-files-list">
                <p class="builder-empty" data-i18n="builder.noFiles">
                  尚未生成文件
                </p>
              </div>
              <button
                type="button"
                class="builder-view-all-btn"
                id="builder-view-all"
                style="display: none"
              >
                <span data-i18n="builder.viewAll">查看全部</span>
                <i class="fas fa-chevron-right"></i>
              </button>
              <button
                class="btn btn-primary builder-download-btn"
                id="builder-download"
                disabled
              >
                <i class="fas fa-download"></i>
                <span data-i18n="builder.downloadZip">下载 ZIP</span>
              </button>
            </div>
          </aside>

          <!-- 对话区 -->
          <section class="builder-chat">
            <div
              class="builder-mobile-overlay"
              id="builder-mobile-overlay"
            ></div>
            <div class="builder-chat-header">
              <div class="builder-chat-title-wrap">
                <div class="builder-chat-title-row">
                  <button
                    type="button"
                    class="builder-mobile-menu-btn"
                    id="builder-mobile-menu"
                    aria-label="Menu"
                    data-i18n-title="builder.menu"
                  >
                    <i class="fas fa-bars"></i>
                  </button>
                  <h2 class="section-title" data-i18n="builder.title">
                    AI 模块构建器
                  </h2>
                  <div
                    class="builder-phase-toggle"
                    id="builder-phase-toggle"
                  >
                    <button
                      type="button"
                      class="builder-phase-seg active"
                      data-phase="plan"
                      data-i18n="builder.phase.plan"
                    >
                      规划
                    </button>
                    <button
                      type="button"
                      class="builder-phase-seg"
                      data-phase="generate"
                      data-i18n="builder.phase.generate"
                    >
                      生成
                    </button>
                  </div>
                </div>
                <p class="section-subtitle" data-i18n="builder.subtitle">
                  描述需求，AI 查阅文档后生成完整 ErisPulse
                  模块代码并打包下载
                </p>
              </div>
              <button
                class="btn btn-outline builder-clear-btn"
                id="builder-clear"
                data-i18n="builder.clear"
              >
                清空
              </button>
            </div>

            <div class="builder-messages" id="builder-messages">
              <div class="builder-msg builder-msg-bot">
                <div class="builder-msg-avatar">
                  <img src="https://www.erisdev.com/assets/img/eris.png" alt="" />
                </div>
                <div class="builder-msg-content" id="builder-welcome"></div>
              </div>
            </div>

            <form class="builder-input-bar" id="builder-form">
              <div
                class="builder-upload-chips"
                id="builder-upload-chips"
                style="display: none"
              ></div>
              <div class="builder-input-row">
                <button
                  type="button"
                  class="builder-upload-btn"
                  id="builder-upload-btn"
                  data-i18n-title="builder.upload.title"
                >
                  <svg
                    class="builder-svg-icon"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    aria-hidden="true"
                  >
                    <path
                      d="m21.44 11.05-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"
                    />
                  </svg>
                </button>
                <input
                  type="file"
                  id="builder-upload-input"
                  multiple
                  accept=".md,.markdown,.txt,.text,.log,.rst,.csv,.tsv,.json,.yaml,.yml,.toml,.ini,.conf,.cfg,.py,.js,.ts,.html,.css,.xml,.sql,text/*,application/json,application/xml,application/x-yaml"
                  style="display: none"
                />
                <textarea
                  id="builder-input"
                  class="builder-input"
                  rows="1"
                  data-i18n-placeholder="builder.inputPlaceholderPlan"
                ></textarea>
                <div class="builder-send-wrap">
                  <button
                    type="submit"
                    class="btn btn-primary builder-send"
                    id="builder-send"
                  >
                    <i class="fas fa-paper-plane"></i>
                    <span data-i18n="builder.send">发送</span>
                    <span
                      class="builder-send-mode-tag"
                      id="builder-send-mode-btn"
                      role="button"
                      tabindex="0"
                      data-i18n-title="builder.sendModeTitle"
                    >
                      <span class="builder-send-mode-label">Enter</span>
                      <i class="fas fa-caret-down"></i>
                    </span>
                  </button>
                  <div
                    class="builder-send-mode-menu"
                    id="builder-send-mode-menu"
                  >
                    <button
                      type="button"
                      class="builder-send-mode-opt"
                      data-mode="enter"
                    >
                      <i class="fas fa-check"></i>
                      <span data-i18n="builder.sendMode.enter"
                        >Enter 发送</span
                      >
                    </button>
                    <button
                      type="button"
                      class="builder-send-mode-opt"
                      data-mode="ctrlEnter"
                    >
                      <i class="fas fa-check"></i>
                      <span data-i18n="builder.sendMode.ctrlEnter"
                        >Ctrl+Enter 发送</span
                      >
                    </button>
                  </div>
                </div>
              </div>
            </form>
          </section>
        </div>

        <!-- 文件查看模态窗 -->
        <div
          class="builder-files-modal"
          id="builder-files-modal"
          style="display: none"
        >
          <div class="builder-files-modal-card">
            <div class="builder-files-modal-header">
              <button
                type="button"
                class="builder-files-modal-back"
                id="builder-files-back"
                style="display: none"
              >
                <i class="fas fa-arrow-left"></i>
              </button>
              <h3
                class="builder-files-modal-title"
                id="builder-files-modal-title"
              >
                已生成文件
              </h3>
              <button
                type="button"
                class="builder-files-modal-close"
                id="builder-files-close"
              >
                <i class="fas fa-times"></i>
              </button>
            </div>
            <div
              class="builder-files-modal-body"
              id="builder-files-modal-body"
            ></div>
          </div>
        </div>

        <!-- 确认模态窗 -->
        <div
          class="builder-files-modal"
          id="builder-confirm-modal"
          style="display: none"
        >
          <div class="builder-files-modal-card builder-confirm-card">
            <p class="builder-confirm-msg" id="builder-confirm-msg"></p>
            <div class="builder-confirm-actions">
              <button
                type="button"
                class="btn btn-outline"
                id="builder-confirm-cancel"
                data-i18n="builder.confirmCancel"
              >
                取消
              </button>
              <button
                type="button"
                class="btn btn-primary"
                id="builder-confirm-ok"
                data-i18n="builder.confirmOk"
              >
                确定
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- ============ 设置抽屉（模型 / MCP 服务 / 知识库） ============ -->
    <div class="builder-settings-drawer" id="builder-settings-drawer">
      <div class="builder-settings-overlay" id="builder-settings-overlay"></div>
      <div class="builder-settings-panel">
        <div class="builder-settings-header">
          <span data-i18n="builder.configSection">配置</span>
          <button type="button" class="builder-config-modal-close" id="builder-settings-close" aria-label="Close">
            <i class="fas fa-times"></i>
          </button>
        </div>
        <div class="builder-config-body">
          <!-- ===== 配置 ===== -->
          <h4 class="builder-config-section-title"><i class="fas fa-robot"></i> <span data-i18n="builder.config">配置</span></h4>
          <div class="builder-config-field">
            <label data-i18n="builder.apiUrl">API 地址</label>
            <input type="text" id="builder-api-url" class="builder-config-input" placeholder="https://api.openai.com/v1" data-i18n-placeholder="builder.apiUrlPlaceholder" autocomplete="off" spellcheck="false" />
          </div>
          <div class="builder-config-field">
            <label data-i18n="builder.apiKey">API Key</label>
            <div class="builder-config-row builder-key-row">
              <input type="password" id="builder-api-key" class="builder-config-input" placeholder="sk-..." data-i18n-placeholder="builder.apiKeyPlaceholder" autocomplete="off" spellcheck="false" />
              <button type="button" class="builder-toggle-eye fas fa-eye" id="builder-toggle-key" aria-label="toggle" style="position:absolute;right:8px;top:50%;transform:translateY(-50%);border:none;background:transparent;color:var(--text-secondary);cursor:pointer;z-index:1;padding:4px 6px"></button>
            </div>
          </div>
          <div class="builder-config-field">
            <label data-i18n="builder.model">模型</label>
            <input type="text" id="builder-model" class="builder-config-input" placeholder="gpt-4o" data-i18n-placeholder="builder.modelPlaceholder" autocomplete="off" spellcheck="false" />
          </div>
          <label class="builder-config-check">
            <input type="checkbox" id="builder-persist-key" />
            <span data-i18n="builder.persistKey">记住密钥（仅本机）</span>
          </label>

          <!-- ===== MCP 服务 ===== -->
          <h4 class="builder-config-section-title">
            <i class="fas fa-plug"></i> <span data-i18n="builder.mcpServers">MCP 服务</span>
            <button id="builder-mcp-restore" data-i18n="builder.mcpRestore" style="margin-left:auto;font-size:0.75rem;background:none;border:none;color:var(--primary);cursor:pointer;padding:0">恢复默认</button>
          </h4>
          <div id="builder-mcp-list" class="builder-mcp-list"></div>
          <div id="builder-mcp-add-form" style="display:none;margin-top:0.6rem">
            <input id="builder-mcp-add-name" placeholder="服务名称" data-i18n-placeholder="builder.mcpName" class="builder-config-input" style="margin-bottom:0.4rem" />
            <input id="builder-mcp-add-url" placeholder="https://..." data-i18n-placeholder="builder.mcpUrlPlaceholder" class="builder-config-input" style="margin-bottom:0.4rem" />
            <div style="display:flex;gap:0.4rem">
              <button id="builder-mcp-add-save" class="btn btn-primary" style="font-size:0.8rem;padding:0.35rem 0.9rem" data-i18n="common.save">保存</button>
              <button id="builder-mcp-add-cancel" class="btn btn-outline" style="font-size:0.8rem;padding:0.35rem 0.9rem" data-i18n="common.cancel">取消</button>
            </div>
          </div>
          <button id="builder-mcp-add-btn" class="btn btn-outline" style="width:100%;margin-top:0.5rem;font-size:0.82rem;padding:0.4rem">
            <i class="fas fa-plus"></i> <span data-i18n="builder.mcpAdd">添加 MCP 服务</span>
          </button>

          <!-- ===== 知识库 ===== -->
          <h4 class="builder-config-section-title"><i class="fas fa-lightbulb"></i> <span data-i18n="builder.knowledgeBase">知识库</span></h4>
          <div id="builder-kb-list-inline" class="builder-kb-inline-list"></div>
          <div id="builder-kb-add-form" style="display:none;margin-top:0.6rem">
            <input id="builder-kb-add-title" placeholder="知识标题" data-i18n-placeholder="builder.kbTitle" class="builder-config-input" style="margin-bottom:0.4rem" />
            <textarea id="builder-kb-add-content" placeholder="知识内容（粘贴文本）" data-i18n-placeholder="builder.kbContent" class="builder-config-input" rows="3" style="margin-bottom:0.4rem;resize:vertical;font-family:inherit"></textarea>
            <div style="display:flex;gap:0.4rem">
              <button id="builder-kb-add-save" class="btn btn-primary" style="font-size:0.8rem;padding:0.35rem 0.9rem" data-i18n="common.save">保存</button>
              <button id="builder-kb-add-cancel" class="btn btn-outline" style="font-size:0.8rem;padding:0.35rem 0.9rem" data-i18n="common.cancel">取消</button>
            </div>
          </div>
          <div style="display:flex;gap:0.4rem;margin-top:0.5rem">
            <button id="builder-kb-add-text-btn" class="btn btn-outline" style="flex:1;font-size:0.82rem;padding:0.4rem"><i class="fas fa-pen"></i> <span data-i18n="builder.kbAddText">添加文本</span></button>
            <button id="builder-kb-import-file-btn" class="btn btn-outline" style="flex:1;font-size:0.82rem;padding:0.4rem"><i class="fas fa-file-import"></i> <span data-i18n="builder.kbImportFile">导入文件</span></button>
            <input type="file" id="builder-kb-file-input" multiple accept=".md,.txt,.py,.js,.ts,.json,.yaml,.yml,.toml,.html,.css,.xml,.sql,.csv" style="display:none" />
          </div>

          <p class="builder-config-desc" style="margin-top:1rem" data-i18n="builder.settingsPrivacy">所有数据保存在浏览器本地，不上传任何服务器。</p>
        </div>
      </div>
    </div>

    <!-- ============ 入口脚本 ============ -->
    <script type="module" src="assets/js/app.js"></script>
  </body>
</html>
